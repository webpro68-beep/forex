name: Identity Scan

on:
  pull_request:
    branches: [ main ]

jobs:
  scan-identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run identity scan
        env:
          PYTHONPATH: backend
        run: |
          python scripts/scan_identity.py
